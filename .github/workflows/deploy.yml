name: Deploy site to Azure

on:
  push:
    branches: [main]
    paths:                    # only redeploy when the site actually changes
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:          # manual run from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # deploys as the SP via --auth-mode login — no storage keys in the repo
      - name: Upload site to the $web container
        run: |
          az storage blob upload-batch \
            --account-name ${{ vars.STORAGE_ACCOUNT }} \
            --auth-mode login \
            --destination '$web' \
            --source site/src \
            --overwrite
